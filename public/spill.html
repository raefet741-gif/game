<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0D0D22" />
    <title>SPILL — truth or dare, on every phone</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=Cairo:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <script>
      // Set language + direction before first paint to avoid a layout flash.
      (function () {
        try {
          var s = localStorage.getItem("spill.lang");
          var n = (navigator.language || "en").slice(0, 2);
          var l = s === "en" || s === "fr" || s === "ar" ? s : n === "fr" ? "fr" : n === "ar" ? "ar" : "en";
          document.documentElement.lang = l;
          document.documentElement.dir = l === "ar" ? "rtl" : "ltr";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <a href="/" class="home-back" title="Home">‹ Home</a>
    <div id="app" class="app"><!-- rendered by app.js --></div>

    <!-- FX layers -->
    <canvas id="confetti" class="confetti-canvas" aria-hidden="true"></canvas>
    <div id="emoji-layer" class="emoji-layer" aria-hidden="true"></div>
    <div id="toasts" class="toasts" aria-live="polite"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
