<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#efe8da" />
    <title>KyuubiZ — party games for every phone</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Yuji+Boku&family=Yuji+Mai&family=Cairo:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/home.css" />
    <script>
      (function () {
        try {
          var s = localStorage.getItem("spill.lang");
          var n = (navigator.language || "en").slice(0, 2);
          var l = s === "en" || s === "fr" || s === "ar" ? s : n === "fr" ? "fr" : n === "ar" ? "ar" : "en";
          document.documentElement.lang = l;
          document.documentElement.dir = l === "ar" ? "rtl" : "ltr";
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="home-body">
    <div id="home" class="home"><!-- rendered by home.js --></div>

    <script type="module" src="/js/home.js"></script>
  </body>
</html>
